<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>ESP32 Console</title>
  <style>
    :root {
      --bg-gradient-top: #2a2a4a;
      --bg-gradient-bottom: #121226;
      --panel-bg: rgba(30, 30, 48, 0.85);
      --term-bg: #0f111a;
      --text-main: #e2e8f0;
      --text-muted: #64748b;
      --color-tx: #c084fc; 
      --color-rx: #2dd4bf; 
      --color-sys: #4ade80; 
      --color-err: #f87171; 
      --btn-active: #6366f1; 
      --btn-inactive: #334155;
      --btn-macro: #4f46e5;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      height: 100dvh; 
      background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-bottom) 100%);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow: hidden; 
    }

    .header-area { padding: 15px 15px 0 15px; flex-shrink: 0; }
    h2 { margin: 0 0 15px 0; font-size: 1.5rem; font-weight: 700; color: #ffffff; }

    .top-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button.ctrl-btn {
      padding: 10px; border: none; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem; cursor: pointer; color: #ffffff;
      transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 5px;
    }
    
    #connectBtn, #infoBtn, #disconnectBtn, #toggleMacrosBtn { background-color: var(--btn-inactive); }
    #disconnectBtn:not([disabled]) { background-color: var(--color-err); }
    #infoBtn:not([disabled]) { background-color: var(--btn-inactive); }
    #toggleMacrosBtn.active { background-color: var(--btn-active); }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }

    .main-area {
      flex: 1; display: flex; flex-direction: column;
      min-height: 0; padding: 15px; gap: 15px;
    }

    /* --- MACRO PAGE --- */
    #macro-page {
      display: none; background-color: var(--panel-bg);
      border-radius: 12px; padding: 15px; 
      overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .macro-grid {
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); 
      grid-auto-rows: 75px; grid-auto-flow: dense; gap: 10px; margin-top: 15px;
    }

    .add-macro-btn {
      width: 100%; background-color: rgba(255, 255, 255, 0.1);
      border: 1px dashed var(--text-muted); color: var(--text-main);
      padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px;
    }

    .custom-macro { 
      background-color: var(--btn-macro); font-size: 1rem; font-weight: bold;
      border-radius: 12px; border: none; color: white; cursor: pointer;
      word-wrap: break-word; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
      transition: transform 0.1s; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5px;
    }
    .custom-macro:active { transform: scale(0.95); }

    /* --- TERMINAL AREA --- */
    #terminal-container {
      flex: 1; background-color: var(--term-bg); border-radius: 12px; padding: 15px;
      overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; line-height: 1.5;
    }
    #terminal-container::-webkit-scrollbar { width: 10px; }
    #terminal-container::-webkit-scrollbar-track { background: transparent; }
    #terminal-container::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
    .log-line { word-wrap: break-word; margin-bottom: 4px; }

    body.show-macros #macro-page { display: block; flex: 4; }
    body.show-macros #terminal-container { flex: 1; }
    body.show-macros .pebble-wrapper { display: none; }

    /* --- THE PEBBLE INPUT --- */
    .pebble-wrapper { padding: 0 15px 15px 15px; flex-shrink: 0; }
    .input-area {
      display: flex; background-color: var(--panel-bg); backdrop-filter: blur(10px);
      border-radius: 30px; padding: 6px 6px 6px 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    input[type="text"] {
      flex-grow: 1; background: transparent; border: none; color: var(--text-main);
      font-family: monospace; font-size: 1rem; outline: none; padding-right: 10px;
    }
    input[type="text"]::placeholder { color: var(--text-muted); }
    #sendBtn {
      flex: 0 0 auto; background-color: var(--btn-active); padding: 12px 24px;
      border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer;
    }
    #sendBtn[disabled] { background-color: var(--btn-inactive); opacity: 0.5; }

    /* --- MODALS --- */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 200;
      justify-content: center; align-items: center;
    }
    .modal {
      background: var(--panel-bg); padding: 20px; border-radius: 15px; width: 85%;
      max-width: 350px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .modal h3 { margin-top: 0; margin-bottom: 15px; }
    
    .modal-input {
      width: 100%; background: rgba(0,0,0,0.3); padding: 12px; margin-bottom: 15px;
      border-radius: 8px; border: 1px solid #334155; color: white; box-sizing: border-box; font-family: inherit; font-size: 1rem;
    }
    .slider-group { margin-bottom: 15px; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px; }
    input[type="range"] { width: 100%; accent-color: var(--color-sys); }
    
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; background-color: var(--btn-inactive); color: white; }
    .btn-save { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; background-color: var(--color-sys); color: #000; font-weight: bold; }
    .btn-delete { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; background-color: var(--color-err); color: white; font-weight: bold; }

    /* Device Info Box */
    #infoContent {
      font-size: 0.85rem; color: #cbd5e1; max-height: 250px; overflow-y: auto; 
      text-align: left; background: rgba(0,0,0,0.4); padding: 12px; 
      border-radius: 8px; margin-bottom: 15px; font-family: 'Courier New', monospace;
      word-wrap: break-word; line-height: 1.6;
    }

  </style>
</head>
<body>

  <div class="header-area">
    <h2>ESP32 Console</h2>
    <div class="top-controls">
      <button class="ctrl-btn" id="connectBtn">🔌 Pair</button>
      <button class="ctrl-btn" id="infoBtn" disabled>ℹ️ Device Info</button>
      <button class="ctrl-btn" id="disconnectBtn" disabled>❌ Disconnect</button>
      <button class="ctrl-btn" id="toggleMacrosBtn">📋 Macros</button>
    </div>
  </div>

  <div class="main-area">
    <div id="macro-page">
      <button id="addMacroBtn" class="add-macro-btn">➕ Create New Macro</button>
      <div id="macro-list" class="macro-grid"></div>
    </div>
    <div id="terminal-container">
      <div class="log-line" style="color: var(--text-muted)">Ready to connect...</div>
    </div>
  </div>

  <div class="pebble-wrapper">
    <div class="input-area">
      <input type="text" id="inputCmd" placeholder="> Enter command..." disabled autocomplete="off">
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <div class="modal-overlay" id="macroModalOverlay">
    <div class="modal">
      <h3 id="modalTitle">New Custom Button</h3>
      <input type="text" id="macroName" class="modal-input" placeholder="Button Name (e.g., OPEN)">
      <input type="text" id="macroCmd" class="modal-input" placeholder="Command (e.g., G_OPEN)">
      
      <div class="slider-group">
        <label><span>Width:</span> <span id="widthVal">2</span></label>
        <input type="range" id="macroWidth" min="1" max="4" value="2">
      </div>
      <div class="slider-group">
        <label><span>Height:</span> <span id="heightVal">1</span></label>
        <input type="range" id="macroHeight" min="1" max="4" value="1">
      </div>

      <div class="modal-btns">
        <button class="btn-cancel" id="cancelMacroBtn">Cancel</button>
        <button class="btn-delete" id="deleteMacroBtn" style="display: none;">Delete</button>
        <button class="btn-save" id="saveMacroBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="infoModalOverlay">
    <div class="modal">
      <h3>Device Profile</h3>
      <div id="infoContent">No active connection.</div>
      <div class="modal-btns">
        <button class="btn-cancel" id="closeInfoBtn" style="flex: 1;">Close</button>
      </div>
    </div>
  </div>

  <script>
    const serviceUuid = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const rxCharacteristicUuid = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
    const txCharacteristicUuid = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 

    let bleDevice, rxCharacteristic;
    const terminal = document.getElementById('terminal-container');
    const inputField = document.getElementById('inputCmd');

    // --- MACRO PAGE & STORAGE ---
    const toggleBtn = document.getElementById('toggleMacrosBtn');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('show-macros');
      toggleBtn.classList.toggle('active');
      if (document.body.classList.contains('show-macros')) {
        toggleBtn.innerHTML = '⌨️ Terminal';
      } else {
        toggleBtn.innerHTML = '📋 Macros';
        terminal.scrollTop = terminal.scrollHeight; 
      }
    });

    let macros = JSON.parse(localStorage.getItem('esp32_macros')) || [];
    let editingIndex = -1; 

    function renderMacros() {
      const list = document.getElementById('macro-list');
      list.innerHTML = ''; 
      macros.forEach((macro, index) => {
        const btn = document.createElement('button');
        btn.className = 'custom-macro';
        btn.style.gridColumn = `span ${macro.w || 2}`;
        btn.style.gridRow = `span ${macro.h || 1}`;
        btn.textContent = macro.name;
        
        btn.onclick = () => sendCommandString(macro.cmd);
        
        let pressTimer;
        let isLongPress = false;
        const startPress = (e) => {
          isLongPress = false;
          pressTimer = window.setTimeout(() => {
            isLongPress = true;
            openEditModal(index); 
          }, 600); 
        };
        const cancelPress = (e) => {
          clearTimeout(pressTimer);
          if (isLongPress) { e.preventDefault(); e.stopPropagation(); }
        };

        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('touchstart', startPress, {passive: true});
        btn.addEventListener('mouseup', cancelPress);
        btn.addEventListener('mouseleave', cancelPress);
        btn.addEventListener('touchend', cancelPress);
        
        list.appendChild(btn);
      });
    }

    // --- MACRO MODAL LOGIC ---
    const macroOverlay = document.getElementById('macroModalOverlay');
    const wSlider = document.getElementById('macroWidth');
    const hSlider = document.getElementById('macroHeight');
    
    wSlider.oninput = () => document.getElementById('widthVal').textContent = wSlider.value;
    hSlider.oninput = () => document.getElementById('heightVal').textContent = hSlider.value;

    document.getElementById('addMacroBtn').addEventListener('click', () => {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = 'New Button';
      document.getElementById('macroName').value = '';
      document.getElementById('macroCmd').value = '';
      wSlider.value = 2; hSlider.value = 1;
      wSlider.dispatchEvent(new Event('input')); hSlider.dispatchEvent(new Event('input'));
      document.getElementById('deleteMacroBtn').style.display = 'none'; 
      macroOverlay.style.display = 'flex';
    });

    function openEditModal(index) {
      editingIndex = index;
      const m = macros[index];
      document.getElementById('modalTitle').textContent = 'Edit Button';
      document.getElementById('macroName').value = m.name;
      document.getElementById('macroCmd').value = m.cmd;
      wSlider.value = m.w || 2;
      hSlider.value = m.h || 1;
      wSlider.dispatchEvent(new Event('input')); hSlider.dispatchEvent(new Event('input'));
      document.getElementById('deleteMacroBtn').style.display = 'block'; 
      macroOverlay.style.display = 'flex';
    }

    document.getElementById('cancelMacroBtn').addEventListener('click', () => macroOverlay.style.display = 'none');
    document.getElementById('deleteMacroBtn').addEventListener('click', () => {
      if (editingIndex > -1) {
        macros.splice(editingIndex, 1);
        localStorage.setItem('esp32_macros', JSON.stringify(macros));
        renderMacros();
        macroOverlay.style.display = 'none';
      }
    });

    document.getElementById('saveMacroBtn').addEventListener('click', () => {
      const name = document.getElementById('macroName').value.trim();
      const cmd = document.getElementById('macroCmd').value.trim();
      const w = parseInt(wSlider.value);
      const h = parseInt(hSlider.value);
      
      if (name && cmd) {
        const macroData = { name, cmd, w, h };
        if (editingIndex === -1) macros.push(macroData); 
        else macros[editingIndex] = macroData; 
        
        localStorage.setItem('esp32_macros', JSON.stringify(macros));
        renderMacros();
        macroOverlay.style.display = 'none';
      } else {
        alert("Please fill in both the Name and Command!");
      }
    });
    renderMacros();

    // --- DEVICE INFO MODAL ---
    const infoOverlay = document.getElementById('infoModalOverlay');
    const infoContent = document.getElementById('infoContent');

    document.getElementById('infoBtn').addEventListener('click', async () => {
      infoOverlay.style.display = 'flex';
      
      if (!bleDevice || !bleDevice.gatt.connected) {
        infoContent.innerHTML = 'No active connection.';
        return;
      }

      let html = `<span style="color: var(--color-sys)">NAME:</span> ${bleDevice.name || 'Unknown'}<br>`;
      html += `<span style="color: var(--color-sys)">ID:</span> ${bleDevice.id}<br><br>`;
      html += `<span style="color: var(--color-tx)">Fetching GATT Profile...</span>`;
      infoContent.innerHTML = html;

      try {
        const services = await bleDevice.gatt.getPrimaryServices();
        html = html.replace(`<span style="color: var(--color-tx)">Fetching GATT Profile...</span>`, `<strong style="color: #fff">GATT SERVICES:</strong><br>`);
        
        for (const service of services) {
          html += `<br><span style="color: var(--color-rx)">Service:</span> ${service.uuid}<br>`;
          try {
            const characteristics = await service.getCharacteristics();
            for (const char of characteristics) {
              let props = [];
              if (char.properties.read) props.push('R');
              if (char.properties.write || char.properties.writeWithoutResponse) props.push('W');
              if (char.properties.notify || char.properties.indicate) props.push('N');
              html += ` &nbsp;↳ Char: ${char.uuid} <span style="color: var(--color-sys)">[${props.join(',')}]</span><br>`;
            }
          } catch (charErr) {
            html += ` &nbsp;↳ <span style="color: var(--color-err)">Cannot read characteristics</span><br>`;
          }
        }
      } catch (e) {
        html += `<br><span style="color: var(--color-err)">Error reading GATT: ${e.message}</span>`;
      }
      infoContent.innerHTML = html;
    });

    document.getElementById('closeInfoBtn').addEventListener('click', () => {
      infoOverlay.style.display = 'none';
    });

    // --- BLUETOOTH CORE LOGIC ---
    function getTimeStamp() {
      const now = new Date();
      return `[${now.toLocaleTimeString('en-US', { hour12: false })}]`;
    }

    function log(text, type = 'sys') {
      let color = 'var(--color-sys)'; let prefix = '';
      if (type === 'err') color = 'var(--color-err)';
      if (type === 'tx') { color = 'var(--color-tx)'; prefix = `${getTimeStamp()} TX: `; }
      if (type === 'rx') { color = 'var(--color-rx)'; prefix = `${getTimeStamp()} RX: `; }

      const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
      terminal.innerHTML += `<div class="log-line" style="color: ${color}">${prefix}${safeText}</div>`;
      terminal.scrollTop = terminal.scrollHeight; 
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        log('Scanning all nearby devices...', 'sys');
        bleDevice = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true, optionalServices: [serviceUuid] 
        });

        bleDevice.addEventListener('gattserverdisconnected', () => {
          log('Disconnected.', 'err');
          toggleUI(false);
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(serviceUuid);
        
        const txCharacteristic = await service.getCharacteristic(txCharacteristicUuid);
        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
          const decoder = new TextDecoder('utf-8');
          const value = decoder.decode(event.target.value).trim(); 
          if (value) log(value, 'rx');
        });

        rxCharacteristic = await service.getCharacteristic(rxCharacteristicUuid);
        terminal.innerHTML = ''; 
        log(`Connected to ${bleDevice.name || 'ESP32'}`, 'sys');
        toggleUI(true);

      } catch (error) {
        if (!error.toString().includes('User cancelled')) { log('Error: ' + error, 'err'); } 
        else { log('Connection cancelled.', 'sys'); }
      }
    });

    async function sendCommandString(cmdStr) {
      if (!rxCharacteristic || !cmdStr) return;
      try {
        const encoder = new TextEncoder('utf-8');
        await rxCharacteristic.writeValue(encoder.encode(cmdStr + '\n'));
        log(cmdStr, 'tx');
      } catch (error) { log('Send Error: ' + error, 'err'); }
    }

    document.getElementById('sendBtn').addEventListener('click', () => {
      const cmd = inputField.value.trim();
      if(cmd) { sendCommandString(cmd); inputField.value = ''; inputField.focus(); }
    });

    inputField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
    });

    function toggleUI(connected) {
      document.getElementById('connectBtn').disabled = connected;
      document.getElementById('infoBtn').disabled = !connected; // Enable Info when connected
      document.getElementById('disconnectBtn').disabled = !connected;
      inputField.disabled = !connected;
      document.getElementById('sendBtn').disabled = !connected;
    }
  </script>
</body>
</html>
