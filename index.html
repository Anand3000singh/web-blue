<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ESP32 Console</title>
  <style>
    :root {
      --bg-gradient-top: #2a2a4a;
      --bg-gradient-bottom: #121226;
      --panel-bg: rgba(30, 30, 48, 0.85); /* Slightly transparent for the floating pebble */
      --term-bg: #0f111a;
      --text-main: #e2e8f0;
      --text-muted: #64748b;
      --color-tx: #c084fc; 
      --color-rx: #2dd4bf; 
      --color-sys: #4ade80; 
      --color-err: #f87171; 
      --btn-active: #6366f1; 
      --btn-inactive: #334155;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 15px;
      height: 100vh;
      box-sizing: border-box;
      background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-bottom) 100%);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      position: relative; /* Needed for the floating pebble */
    }

    h2 {
      margin: 0 0 15px 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
    }

    .top-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      color: #ffffff;
    }
    
    #connectBtn, #disconnectBtn { background-color: var(--btn-inactive); }
    #disconnectBtn:not([disabled]) { background-color: var(--btn-active); }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }

    #terminal-container {
      flex-grow: 1;
      background-color: var(--term-bg);
      border-radius: 12px;
      padding: 15px;
      /* Add extra padding at the bottom so text doesn't hide behind the floating pebble */
      padding-bottom: 80px; 
      overflow-y: auto;
      margin-bottom: 0; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    #terminal-container::-webkit-scrollbar { width: 14px; }
    #terminal-container::-webkit-scrollbar-track { background: transparent; margin: 10px 0; }
    #terminal-container::-webkit-scrollbar-thumb {
      background-color: #334155;
      border-radius: 10px;
      border: 4px solid var(--term-bg); 
    }

    .log-line { word-wrap: break-word; margin-bottom: 4px; }

    /* --- THE FLOATING PEBBLE --- */
    .input-area {
      position: fixed; /* Pins it to the screen */
      bottom: 20px; /* 20px from the bottom */
      left: 50%;
      transform: translateX(-50%); /* Centers it perfectly */
      width: calc(100% - 40px); /* Adjusts to screen width minus margins */
      max-width: 600px;
      display: flex;
      background-color: var(--panel-bg);
      backdrop-filter: blur(10px); /* Gives it a modern frosted glass look */
      border-radius: 30px; /* Heavy rounding for the pebble look */
      padding: 6px 6px 6px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6); /* Heavy drop shadow to make it float */
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    input[type="text"] {
      flex-grow: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: monospace;
      font-size: 1rem;
      outline: none;
      padding-right: 10px;
    }
    
    input[type="text"]::placeholder { color: var(--text-muted); }

    #sendBtn {
      flex: 0 0 auto;
      background-color: var(--btn-active);
      padding: 12px 24px;
      border-radius: 25px; /* Round the button to match the pebble */
    }
    #sendBtn[disabled] { background-color: var(--btn-inactive); opacity: 0.5; }

  </style>
</head>
<body>

  <h2>ESP32 Console</h2>
  
  <div class="top-controls">
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
  </div>

  <div id="terminal-container">
    <div class="log-line" style="color: var(--text-muted)">Ready to connect...</div>
  </div>

  <div class="input-area">
    <input type="text" id="inputCmd" placeholder="> Enter command..." disabled autocomplete="off">
    <button id="sendBtn" disabled>Send</button>
  </div>

  <script>
    const serviceUuid = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const rxCharacteristicUuid = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
    const txCharacteristicUuid = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 

    let bleDevice, rxCharacteristic;
    const terminal = document.getElementById('terminal-container');
    const inputField = document.getElementById('inputCmd');

    function getTimeStamp() {
      const now = new Date();
      return `[${now.toLocaleTimeString('en-US', { hour12: false })}]`;
    }

    function log(text, type = 'sys') {
      let color = 'var(--color-sys)'; 
      let prefix = '';
      
      if (type === 'err') color = 'var(--color-err)';
      if (type === 'tx') {
        color = 'var(--color-tx)';
        prefix = `${getTimeStamp()} TX: `;
      }
      if (type === 'rx') {
        color = 'var(--color-rx)';
        prefix = `${getTimeStamp()} RX: `;
      }

      const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
      terminal.innerHTML += `<div class="log-line" style="color: ${color}">${prefix}${safeText}</div>`;
      terminal.scrollTop = terminal.scrollHeight; 
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        log('Scanning all nearby devices...', 'sys');
        
        // FIX: Accept all devices so the list populates, but strictly request our service
        bleDevice = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [serviceUuid] 
        });

        bleDevice.addEventListener('gattserverdisconnected', () => {
          log('Disconnected.', 'err');
          toggleUI(false);
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(serviceUuid);
        
        const txCharacteristic = await service.getCharacteristic(txCharacteristicUuid);
        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
          const decoder = new TextDecoder('utf-8');
          const value = decoder.decode(event.target.value).trim(); 
          if (value) log(value, 'rx');
        });

        rxCharacteristic = await service.getCharacteristic(rxCharacteristicUuid);

        terminal.innerHTML = ''; 
        log('Active.', 'sys');
        toggleUI(true);
        inputField.focus();

      } catch (error) {
        if (!error.toString().includes('User cancelled')) {
          log('Error: ' + error, 'err');
        } else {
          log('Connection cancelled.', 'sys');
        }
      }
    });

    async function sendCommand() {
      const command = inputField.value.trim();
      if (!rxCharacteristic || !command) return;

      try {
        const encoder = new TextEncoder('utf-8');
        await rxCharacteristic.writeValue(encoder.encode(command + '\n'));
        log(command, 'tx');
        inputField.value = ''; 
      } catch (error) {
        log('Send Error: ' + error, 'err');
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendCommand);

    inputField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendCommand();
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
    });

    function toggleUI(connected) {
      document.getElementById('connectBtn').disabled = connected;
      document.getElementById('disconnectBtn').disabled = !connected;
      inputField.disabled = !connected;
      document.getElementById('sendBtn').disabled = !connected;
    }
  </script>
</body>
</html>
