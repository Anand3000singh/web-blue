<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Glass Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(20, 25, 35, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --accent-color: #6366f1; /* Indigo accent */
      --accent-hover: #818cf8;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      /* Animated deep gradient background to make the glass pop */
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #020617);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 90%;
      max-width: 800px;
      padding: 24px;
      /* The Glass Effect */
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    button {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }

    button:hover:not(:disabled) {
      background: var(--accent-color);
      border-color: var(--accent-color);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #terminal {
      height: 400px;
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.5;
      box-sizing: border-box;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    /* Custom Scrollbar for Terminal */
    #terminal::-webkit-scrollbar { width: 8px; }
    #terminal::-webkit-scrollbar-track { background: transparent; }
    #terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    #terminal::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    .input-area {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex-grow: 1;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    input[type="text"]:disabled {
      opacity: 0.4;
    }

    #sendBtn {
      background: var(--accent-color);
      border-color: var(--accent-color);
      padding: 12px 24px;
    }

    #sendBtn:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Terminal text colors */
    .log-sys { color: var(--text-muted); }
    .log-err { color: #f87171; }
    .log-succ { color: #4ade80; }
    .log-rx { color: #2dd4bf; }
    .log-tx { color: #c084fc; }

    @media (max-width: 600px) {
      .container { width: 95%; padding: 16px; }
      #terminal { height: 300px; }
      .header { flex-direction: column; align-items: flex-start; }
      .btn-group { width: 100%; }
      .btn-group button { flex-grow: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h2>ESP32 Console</h2>
      <div class="btn-group">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
      </div>
    </div>

    <div id="terminal">
      <div class="log-sys">Waiting for connection...</div>
    </div>

    <div class="input-area">
      <input type="text" id="inputCmd" placeholder="> Enter command..." disabled autocomplete="off">
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <script>
    const serviceUuid = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const rxCharacteristicUuid = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
    const txCharacteristicUuid = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 

    let bleDevice, rxCharacteristic;
    const terminal = document.getElementById('terminal');
    const inputCmd = document.getElementById('inputCmd');

    // Enhanced logging system with specific CSS classes
    function log(text, type = 'sys') {
      const time = new Date().toLocaleTimeString([], { hour12: false });
      terminal.innerHTML += `<div class="log-${type}">[${time}] ${text}</div>`;
      terminal.scrollTop = terminal.scrollHeight;
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        log('Scanning nearby Bluetooth devices...', 'sys');
        
        bleDevice = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [serviceUuid] 
        });

        bleDevice.addEventListener('gattserverdisconnected', () => {
          log('Connection lost.', 'err');
          toggleUI(false);
        });

        log(`Connecting to ${bleDevice.name || 'Device'}...`, 'sys');
        const server = await bleDevice.gatt.connect();

        const service = await server.getPrimaryService(serviceUuid);

        const txCharacteristic = await service.getCharacteristic(txCharacteristicUuid);
        await txCharacteristic.startNotifications();
        
        txCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
          const decoder = new TextDecoder('utf-8');
          log('RX: ' + decoder.decode(event.target.value).trim(), 'rx');
        });

        rxCharacteristic = await service.getCharacteristic(rxCharacteristicUuid);

        log('Link Established. Terminal Active.', 'succ');
        toggleUI(true);
        inputCmd.focus();

      } catch (error) {
        log('Error: ' + error.message, 'err');
      }
    });

    async function sendCommand() {
      const command = inputCmd.value;
      if (!rxCharacteristic || !command) return;

      try {
        const encoder = new TextEncoder('utf-8');
        await rxCharacteristic.writeValue(encoder.encode(command + '\n'));
        log('TX: ' + command, 'tx');
        inputCmd.value = ''; 
      } catch (error) {
        log('Send Failed: ' + error.message, 'err');
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendCommand);
    
    // Allow pressing "Enter" on the keyboard to send
    inputCmd.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendCommand();
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
    });

    function toggleUI(connected) {
      document.getElementById('connectBtn').disabled = connected;
      document.getElementById('disconnectBtn').disabled = !connected;
      inputCmd.disabled = !connected;
      document.getElementById('sendBtn').disabled = !connected;
    }
  </script>
</body>
</html>
